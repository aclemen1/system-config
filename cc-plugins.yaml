marketplaces:
  - path: ~/code/aclemen1/aclemen1-marketplace
    autoUpdate: true
  - path: ~/code/unisis-unil/unisis-marketplace
    autoUpdate: true
  - path: kepano/obsidian-skills
    autoUpdate: true

installations:
  - scope: user
    plugins:
      - version-control@unisis-marketplace

  - scope: project
    folder: ~/vaults/Alain Clément
    plugins:
      - obsidian@aclemen1-marketplace
      - productivity@aclemen1-marketplace
      - doc-authoring@unisis-marketplace
      - obsidian@obsidian-skills

  - scope: project
    folder: ~/vaults/quant
    plugins:
      - obsidian@obsidian-skills
      - productivity@aclemen1-marketplace

  - scope: project
    folder: ~/vaults/goodies
    plugins:
      - obsidian@obsidian-skills

  - scope: project
    folder: ~/vaults/UNISIS
    plugins:
      - obsidian@aclemen1-marketplace
      - productivity@aclemen1-marketplace
      - analytics@unisis-marketplace
      - compliance@unisis-marketplace
      - doc-authoring@unisis-marketplace
      - doc-extraction@unisis-marketplace
      - r-tools@unisis-marketplace
      - obsidian@obsidian-skills

  - scope: project
    folder: ~/vaults/Eve Clément
    plugins:
      - obsidian@aclemen1-marketplace
      - productivity@aclemen1-marketplace
      - obsidian@obsidian-skills
